name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build FlowGate
        run: |
          mkdir -p .tmp
          go build -o ./.tmp/flowgate ./cmd/flowgate

      - name: Run smoke test
        run: python3 scripts/smoke_test.py --binary ./.tmp/flowgate
